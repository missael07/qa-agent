name: QA Agent

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL a probar'
        required: true
        default: 'https://tuweb.com'

  schedule:
    - cron: '0 15 * * *'

jobs:
  qa:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Instalar navegadores
        run: npx playwright install --with-deps

      - name: Ejecutar agente QA
        run: npx playwright test
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://tuweb.com' }}

      - name: Subir reporte
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: playwright-report/