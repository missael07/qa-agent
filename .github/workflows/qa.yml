name: QA Agent

on:
  workflow_dispatch:

  repository_dispatch:
    types:
      - run-qa

  schedule:
    - cron: '0 15 * * *'

jobs:
  qa:
    runs-on: ubuntu-latest

    env:
      BASE_URL: https://staging--loginqaangent.netlify.app

    steps:
      - name: Checkout QA Agent
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run QA Tests
        run: npx playwright test

      - name: Upload QA Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: playwright-report/

  create-pr:
    needs: qa
    runs-on: ubuntu-latest

    steps:
      - name: Create Pull Request staging to master
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.NUXT_REPO_TOKEN }}" \
            https://api.github.com/repos/missael07/nuxt-qa-demo/pulls \
            -d '{
              "title": "Promote staging to master after QA passed",
              "head": "staging",
              "base": "master",
              "body": "QA Agent passed successfully. This PR promotes staging to master."
            }'